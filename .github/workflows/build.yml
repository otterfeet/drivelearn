name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-app:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip3 install --user --upgrade buildozer virtualenv
        pip3 install --user "Cython==0.29.33"

    - name: Build Main App
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Upload Main APK
      uses: actions/upload-artifact@v4
      with:
        name: DriveLearn-All-In-One-APK
        path: bin/*.apk
