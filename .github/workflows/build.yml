name: Build Android APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apps:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip3 install --user --upgrade buildozer virtualenv
        pip3 install --user "Cython==0.29.33"

    - name: Build Main App
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Upload Main APK
      uses: actions/upload-artifact@v4
      with:
        name: DriveLearn-Main-APK
        path: bin/*.apk

    - name: Build Reset App
      run: |
        export PATH=$PATH:~/.local/bin
        cd ResetUtility
        buildozer android debug

    - name: Upload Reset APK
      uses: actions/upload-artifact@v4
      with:
        name: DriveLearn-Reset-APK
        path: ResetUtility/bin/*.apk
